<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | xTeraPlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Inter:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent-neon);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .error-msg {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">xTera<span>Play</span></a>
    </nav>

    <main class="error-page animate-fadeIn">
        <div class="error-code">404</div>
        <div class="error-msg">The page you're looking for has drifted into deep space.</div>
        <a href="/" class="btn btn-primary">Back to Mission Control</a>
    </main>
</body>

</html>
