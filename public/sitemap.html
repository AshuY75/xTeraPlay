<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap - xTeraPlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .content-page {
            padding: 8rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .sitemap-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .sitemap-list a {
            color: var(--accent-neon);
            text-decoration: none;
            font-weight: 500;
        }

        .sitemap-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">xTera<span>Play</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/terms">Terms & Conditions</a>
                <a href="/privacy">Privacy</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>
    <main class="content-page animate-fadeIn">
        <h1>Sitemap</h1>
        <div class="sitemap-list">
            <div>
                <h3 style="margin-bottom: 1rem;">Main Pages</h3>
                <ul style="list-style: none;">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About Us</a></li>
                    <li><a href="/faq">FAQ</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
            <div>
                <h3 style="margin-bottom: 1rem;">Legal</h3>
                <ul style="list-style: none;">
                    <li><a href="/privacy">Privacy Policy</a></li>
                    <li><a href="/terms">Terms of Service</a></li>
                    <li><a href="/cookies">Cookie Policy</a></li>
                    <li><a href="/disclaimer">Disclaimer</a></li>
                    <li><a href="/dmca">DMCA Policy</a></li>
                </ul>
            </div>
        </div>
    </main>
</body>

</html>
