<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – xTeraPlay</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/716/716429.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .content-page {
            padding: 8rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input,
        textarea {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent-neon);
        }

        textarea {
            height: 150px;
            resize: vertical;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">xTera<span>Play</span></a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/terms">Terms & Conditions</a>
                <a href="/privacy">Privacy</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <main class="content-page container animate-fadeIn">
        <h1 class="gradient-text" style="text-align: center; margin-bottom: 2rem;">Get in Touch</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 3rem;">Have questions or feedback?
            We'd love to hear from you. Fill out the form below and we'll get back to you as soon as possible.</p>

        <form id="contactForm" class="glass card-content"
            style="background: var(--bg-surface); padding: 2.5rem; border-radius: 16px; border: 1px solid var(--glass-border);">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit" class="btn-play" style="width: 100%;">Send Message</button>
            <p id="formStatus" style="display:none; text-align: center; margin-top: 1rem; color: var(--accent-neon);">
            </p>
        </form>
    </main>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('formStatus');
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    status.textContent = "Message sent successfully!";
                    status.style.display = "block";
                    e.target.reset();
                } else {
                    status.textContent = "Wait, something went wrong.";
                    status.style.display = "block";
                }
            } catch (err) {
                status.textContent = "Service unavailable. Try again later.";
                status.style.display = "block";
            }
        });
    </script>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 xTeraPlay. All rights reserved.
        </div>
    </footer>
</body>

</html>
